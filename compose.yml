services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka-server
    restart: always
    ports:
      - 9092:9092
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      # Use 0.0.0.0 to ensure it listens on all interfaces inside the container
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      # This is what Kafka tells the Auth_Service to use
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka-server:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      # Crucial: The controller must be reachable at this address
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-server:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
    networks:
      - banking-net
  auth-db:
    image: postgres:alpine
    container_name: auth-db-instance
    restart: always
    ports:
      - 5433:5432
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=banking_service
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d banking_service"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - auth_postgresql_data:/var/lib/postgresql
    networks:
      - banking-net
  account-db:
    image: postgres:alpine
    container_name: account-db-instance
    restart: always
    ports:
      - 5434:5432
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=account_service
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d account_service"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - account_postgresql_data:/var/lib/postgresql
    networks:
      - banking-net
  cache-db:
    image: redis
    container_name: cache-instance
    restart: always
    ports:
      - 6379:6379
    command: redis-server --requirepass password
    volumes:
      - cache_data:/data
    networks:
      - banking-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "password", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  auth_service:
    build: 
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth_service_server
    ports:
      - 3001:3001
    depends_on:
      - auth-db
      - cache-db
      - kafka
    env_file:
      - ./auth-service/.env
    networks:
      - banking-net
  account_service:
    build: 
      context: ./account-service
      dockerfile: Dockerfile
    container_name: account_service_server
    depends_on:
      - account-db
      - cache-db
      - kafka
    ports:
      - 3002:3002
    env_file:
      - ./account-service/.env
    networks:
      - banking-net
  api_gateway_service:
    build: 
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api_gateway_server
    ports:
      - 3000:3000
    env_file:
      - ./api-gateway/.env
    networks:
      - banking-net
networks:
  banking-net:
    driver: bridge
volumes:
  auth_postgresql_data:
  account_postgresql_data:
  cache_data:

